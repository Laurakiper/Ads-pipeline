<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiper · Generador de Carruseles de Pauta</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #3ABFAA;
      --teal-dark: #1A8070;
      --sand: #F0EDE6;
      --blush: #F2C4CE;
      --lavender: #C9B8E8;
      --mint: #A8D8C8;
      --peach: #F5C49A;
      --sky: #A3CDED;
      --coral: #E8826A;
      --dark: #2D2B38;
      --blush-light: #FAE8EC;
      --lavender-light: #EDE8F7;
      --mint-light: #DFF2EB;
      --peach-light: #FDE9D4;
      --border: #D8C8B0;
      --border-soft: #EDE8E0;
      --white: #ffffff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --font: 'Plus Jakarta Sans', Arial, sans-serif;
      --radius: 14px;
      --radius-lg: 20px;
      --radius-pill: 100px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--sand);
      color: var(--dark);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── HEADER ── */
    header {
      background: rgba(240, 237, 230, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-soft);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      height: 60px;
    }
    .logo-mark {
      width: 34px; height: 34px;
      background: var(--teal);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 17px; color: white;
    }
    .logo-text { font-size: 16px; font-weight: 800; color: var(--teal); letter-spacing: -0.3px; }
    .logo-text span { color: var(--dark); font-weight: 500; }
    .logo-sub {
      font-size: 11px; color: var(--dark); opacity: 0.4;
      margin-left: auto; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 36px 24px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 28px;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar { position: sticky; top: 92px; display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dark);
      opacity: 0.4;
      margin-bottom: 14px;
    }

    /* API KEY */
    .api-row { display: flex; gap: 8px; }
    .api-input {
      flex: 1;
      font-family: monospace;
      font-size: 13px;
      padding: 10px 12px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: var(--sand);
      color: var(--dark);
      outline: none;
      transition: border-color 0.15s;
    }
    .api-input:focus { border-color: var(--teal); }
    .api-input::placeholder { color: var(--dark); opacity: 0.35; }
    .btn-icon {
      width: 40px; height: 40px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: var(--sand);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--mint-light); border-color: var(--teal); }
    .api-note { margin-top: 8px; font-size: 11px; color: var(--dark); opacity: 0.5; line-height: 1.5; }
    .api-note a { color: var(--teal-dark); text-decoration: none; font-weight: 600; }
    .api-note a:hover { text-decoration: underline; }

    /* ── SEGMENTED (ETAPA) ── */
    .segmented { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .seg-btn {
      border: 1px solid var(--border-soft);
      background: var(--sand);
      border-radius: var(--radius);
      padding: 12px 6px 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .seg-btn:hover { border-color: var(--teal); }
    .seg-btn .seg-name { font-size: 13px; font-weight: 800; color: var(--dark); letter-spacing: -0.2px; }
    .seg-btn .seg-tag { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.5; margin-top: 2px; }
    .seg-btn.active { background: var(--teal); border-color: var(--teal); }
    .seg-btn.active .seg-name, .seg-btn.active .seg-tag { color: white; opacity: 1; }
    .stage-desc {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--dark);
      opacity: 0.7;
      background: var(--mint-light);
      border-radius: var(--radius);
      padding: 10px 12px;
      min-height: 0;
      display: none;
    }
    .stage-desc.show { display: block; }

    /* ANGLES */
    .angles-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; padding-right: 4px; }
    .angles-list::-webkit-scrollbar { width: 6px; }
    .angles-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }
    .angle-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      width: 100%;
      font-family: var(--font);
    }
    .angle-btn:hover { background: var(--mint-light); border-color: var(--teal); }
    .angle-btn.active { background: var(--mint-light); border-color: var(--teal); }
    .angle-num {
      width: 24px; height: 24px; flex-shrink: 0;
      border-radius: 8px;
      background: var(--sand);
      font-size: 11px; font-weight: 700;
      color: var(--dark); opacity: 0.6;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .angle-btn.active .angle-num { background: var(--teal); color: white; opacity: 1; }
    .angle-label { font-size: 13px; color: var(--dark); line-height: 1.3; font-weight: 500; }

    /* CONTROLS */
    .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .control-label { font-size: 13px; color: var(--dark); opacity: 0.8; font-weight: 500; }
    .stepper { display: flex; align-items: center; gap: 6px; }
    .step-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      background: var(--sand);
      cursor: pointer;
      font-size: 18px;
      color: var(--dark);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      line-height: 1;
    }
    .step-btn:hover { background: var(--mint-light); border-color: var(--teal); color: var(--teal-dark); }
    .step-val { width: 24px; text-align: center; font-weight: 800; font-size: 15px; }

    .btn-generate {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease-in-out, box-shadow 0.15s, background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-generate:hover:not(:disabled) { transform: scale(1.03); box-shadow: 0 4px 16px rgba(58,191,170,0.35); }
    .btn-generate:disabled { background: var(--border); opacity: 0.7; cursor: not-allowed; }

    .btn-hooks {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: transparent;
      color: var(--teal-dark);
      border: 2px solid var(--teal);
      border-radius: var(--radius-pill);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-hooks:hover:not(:disabled) { background: var(--teal); color: white; }
    .btn-hooks:disabled { border-color: var(--border); color: var(--dark); opacity: 0.4; cursor: not-allowed; }

    /* HOOK CARDS */
    .hook-card {
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      display: flex; align-items: flex-start; gap: 14px;
      animation: fadeUp 0.5s ease both;
    }
    .hook-index {
      width: 28px; height: 28px; flex-shrink: 0;
      border-radius: 9px;
      background: var(--teal);
      color: white;
      font-weight: 800; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .hook-main { flex: 1; }
    .hook-text { font-size: 16px; font-weight: 700; color: var(--dark); line-height: 1.35; letter-spacing: -0.2px; }
    .hook-type {
      display: inline-block; margin-top: 7px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 3px 10px; border-radius: var(--radius-pill);
    }
    .type-tension { background: var(--blush-light); color: #C05070; }
    .type-curiosidad { background: var(--mint-light); color: var(--teal-dark); }
    .type-reframe { background: var(--peach-light); color: #C07030; }

    /* ── MAIN OUTPUT ── */
    .main { display: flex; flex-direction: column; gap: 14px; }

    .empty-state {
      background: var(--white);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 72px 40px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .empty-deco { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .empty-deco span { width: 14px; height: 14px; border-radius: 50%; animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .empty-title { font-size: 22px; font-weight: 800; color: var(--dark); margin-bottom: 8px; letter-spacing: -0.4px; }
    .empty-desc { font-size: 14px; color: var(--dark); opacity: 0.5; }

    .loading-state {
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 56px 40px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--mint-light);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--dark); opacity: 0.55; }

    /* CAROUSEL HEADER */
    .carousel-header {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      box-shadow: var(--shadow);
    }
    .carousel-meta { display: flex; flex-direction: column; gap: 4px; }
    .carousel-chips { display: flex; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
    .chip {
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
      padding: 3px 10px; border-radius: var(--radius-pill);
    }
    .chip-stage { background: var(--teal); color: white; }
    .chip-count { background: var(--lavender-light); color: #7050B0; }
    .carousel-angle { font-size: 15px; font-weight: 700; color: var(--dark); letter-spacing: -0.2px; }
    .btn-export {
      padding: 9px 16px;
      background: transparent;
      border: 2px solid var(--teal);
      border-radius: var(--radius-pill);
      font-family: var(--font);
      font-size: 13px; font-weight: 700;
      color: var(--teal);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-export:hover { background: var(--teal); color: white; }

    /* SLIDE CARDS */
    .slide-card {
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }

    .slide-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border-soft);
      background: var(--sand);
    }
    .slide-pill {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      padding: 4px 12px; border-radius: var(--radius-pill);
    }
    .pill-hook { background: var(--blush-light); color: #C05070; }
    .pill-content { background: var(--mint-light); color: var(--teal-dark); }
    .pill-cta { background: var(--peach-light); color: #C07030; }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.6; }

    .btn-copy {
      font-family: var(--font);
      font-size: 12px; font-weight: 700;
      padding: 5px 14px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-pill);
      background: white;
      color: var(--dark);
      opacity: 0.8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-copy:hover { background: var(--mint-light); border-color: var(--teal); color: var(--teal-dark); opacity: 1; }
    .btn-copy.copied { background: var(--teal); border-color: var(--teal); color: white; opacity: 1; }

    .slide-body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .field-block { display: flex; flex-direction: column; gap: 6px; }
    .field-name {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dark); opacity: 0.4;
    }
    .field-val {
      font-size: 14px; color: var(--dark);
      line-height: 1.55;
      background: var(--sand);
      border-radius: var(--radius);
      padding: 12px 14px;
      flex: 1;
    }
    .field-val.img-desc {
      border: 1px dashed var(--border);
      background: var(--white);
      color: var(--dark);
      opacity: 0.75;
      font-size: 13px;
      font-style: italic;
    }
    .field-val.cta-btn {
      background: var(--teal);
      color: white;
      font-weight: 800;
      font-size: 15px;
      text-align: center;
      border-radius: var(--radius-pill);
      flex: none;
    }

    /* ERROR */
    .error-card {
      background: var(--blush-light);
      border: 1px solid var(--blush);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }
    .error-title { font-weight: 800; color: var(--coral); margin-bottom: 8px; font-size: 14px; }
    .error-body { font-size: 13px; color: #8b2c1c; line-height: 1.6; font-family: monospace; background: rgba(255,255,255,0.6); padding: 10px; border-radius: 8px; word-break: break-all; }

    /* RESPONSIVE */
    @media (max-width: 820px) {
      .container { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .slide-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">K</div>
  <span class="logo-text">Kiper <span>Ads</span></span>
  <span class="logo-sub">Generador de carruseles</span>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- API KEY -->
    <div class="card">
      <p class="card-title">API Key de Anthropic</p>
      <div class="api-row">
        <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
        <button class="btn-icon" id="toggleKey" title="Mostrar/ocultar">👁</button>
      </div>
      <p class="api-note">
        Obtén tu key en <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>.<br>
        Se guarda solo en tu navegador (localStorage).
      </p>
    </div>

    <!-- ETAPA DEL FUNNEL -->
    <div class="card">
      <p class="card-title">Etapa del funnel</p>
      <div class="segmented" id="stageList"></div>
      <div class="stage-desc" id="stageDesc"></div>
    </div>

    <!-- ÁNGULOS -->
    <div class="card">
      <p class="card-title">Ángulo de venta</p>
      <div class="angles-list" id="anglesList"></div>
    </div>

    <!-- CONTROLES -->
    <div class="card">
      <p class="card-title">Configuración</p>
      <div class="control-row">
        <span class="control-label">Slides de contenido</span>
        <div class="stepper">
          <button class="step-btn" id="stepDown">−</button>
          <span class="step-val" id="stepVal">3</span>
          <button class="step-btn" id="stepUp">+</button>
        </div>
      </div>
      <button class="btn-generate" id="genBtn" disabled>
        <span id="genIcon">✦</span>
        <span id="genText">Completa los campos</span>
      </button>
      <button class="btn-hooks" id="hooksBtn" disabled>⚡ Generar 5 hooks para testear</button>
    </div>

  </aside>

  <!-- OUTPUT -->
  <main class="main" id="output">
    <div class="empty-state">
      <div class="empty-deco">
        <span style="background:var(--blush);animation-delay:0s;"></span>
        <span style="background:var(--lavender);animation-delay:0.6s;"></span>
        <span style="background:var(--peach);animation-delay:1.2s;"></span>
      </div>
      <div class="empty-title">Listo para generar</div>
      <div class="empty-desc">Agrega tu API key, elige etapa + ángulo<br>y presiona generar.</div>
    </div>
  </main>

</div>

<script>
  /* ── ETAPAS DEL FUNNEL ── */
  const STAGES = {
    TOFU: {
      name: "TOFU",
      tag: "Frío",
      desc: "Frío · no te conoce. Vende la idea del ángulo, sin precio ni specs. CTA suave.",
      prompt: `ETAPA DEL FUNNEL: TOFU (público frío, no conoce Kiper).
- OBJETIVO: parar el scroll y vender la IDEA del ángulo, no el reloj. Crear la realización en la cabeza del papá.
- PROHIBIDO en esta etapa: mencionar precio, plan mensual o specs técnicas. Nada de "$", nada de listas de funciones.
- El hook debe dejar una idea abierta que OBLIGUE a deslizar. No resuelvas nada en el slide 1.
- CTA suave, de descubrimiento. Botón tipo "Descúbrelo" / "Conoce Kiper". Nada de "compra".`
    },
    MOFU: {
      name: "MOFU",
      tag: "Tibio",
      desc: "Tibio · ya te vio o conoce la categoría. Mecanismo + prueba + reframe de precio. CTA medio.",
      prompt: `ETAPA DEL FUNNEL: MOFU (público tibio, ya vio Kiper o conoce la categoría del reloj para niños).
- OBJETIVO: mostrar el mecanismo y dar prueba. Manejar la objeción real "¿de verdad funciona?" y "¿mi hijo lo va a usar?".
- Puedes mencionar 1–2 funciones clave de forma concreta (GPS en tiempo real, llamadas solo a contactos aprobados, foto remota). Una por slide, no listas.
- Reframe de precio permitido como idea, NO como número: "cuesta menos que el celular que no le vas a dar".
- Al menos un slide de contenido debe manejar una objeción, no rellenar.
- CTA de consideración. Botón tipo "Mira cómo funciona" / "Conoce el plan".`
    },
    BOFU: {
      name: "BOFU",
      tag: "Caliente",
      desc: "Caliente · retargeting. Justifica precio, contraentrega, garantía y cierra duro.",
      prompt: `ETAPA DEL FUNNEL: BOFU (público caliente, retargeting: ya te visitó, vio el producto o abandonó el carrito).
- OBJETIVO: cerrar la venta. Asume que ya quiere Kiper; solo le falta el empujón y resolver la última objeción.
- USA SOLO datos del BANCO DE ARGUMENTOS de abajo. No inventes cifras, garantías ni medios de pago.
- UN argumento por slide. Elige los más fuertes para cerrar; no amontones todo. Orden de fuerza para liderar: prueba social → envío gratis → pago contraentrega → garantía 30 días → precio con ancla.
- CTA duro y directo. Botón tipo "Lo quiero" / "Pídelo hoy".

BANCO DE ARGUMENTOS BOFU (verídicos, úsalos tal cual):
• PRUEBA SOCIAL: 4.9/5 en más de 1.000 reseñas · +3.000 familias ya tienen Kiper · 79 reseñas verificadas.
• PRECIO: antes $449.900, hoy $399.900 (muestra el ancla tachada). Pago contraentrega, tarjeta de crédito, Sistecrédito (cuotas) y MercadoPago.
• ENVÍO: gratis a todo el país, sale el mismo día o al siguiente (Coordinadora e Interrapidísimo).
• INCLUYE: reloj + cable + cargador + SIM con 1 mes gratis de minutos y datos. Listo para usar desde el primer día, sin apps. Vidrio templado disponible.
• GARANTÍAS: satisfacción 30 días · producto 1 año por defectos o pérdida de señal · soporte por WhatsApp con agentes reales.
• CONTROL PARENTAL: el papá maneja todo por WhatsApp (ubicación, contactos autorizados, foto remota), desde el celular que ya tiene. Sin apps complejas.
• PLAN POST-COMPRA: $32.900/mes, minutos y datos ilimitados, sin permanencia, se activa tras el mes gratis.
REGLA: NO lideres ni hagas hero de "escucha de entorno" — choca con el posicionamiento (conexión, no vigilancia). Úsala solo si es estrictamente necesario y nunca como argumento principal.`
    }
  };

  /* ── ÁNGULOS ── */
  const ANGLES = [
    {n:1, t:"Papá que decide diferente"},
    {n:2, t:"No quiere perderse la niñez"},
    {n:3, t:"No todo avance es progreso"},
    {n:4, t:"Conexión sin adelantar etapas"},
    {n:5, t:"El celular ya no es la única opción"},
    {n:6, t:"Profesional y papá presente"},
    {n:7, t:"Minimalismo en comunicación"},
    {n:8, t:"Orden en el uso de celulares"},
    {n:9, t:"Niño incomunicado no es lo adecuado"},
    {n:10, t:"Un paso adelante"},
    {n:11, t:"Demo producto en uso real"},
    {n:12, t:"Cuidar y escucharlos tú mismo"},
    {n:13, t:"Presente sin sofocar"},
  ];

  let selStage = null;
  let selAngle = null;
  let slideCount = 3;
  let currentSlides = [];

  /* ── API KEY ── */
  const apiInput = document.getElementById('apiKey');
  const saved = localStorage.getItem('kiper_api_key');
  if (saved) apiInput.value = saved;
  apiInput.addEventListener('input', () => {
    localStorage.setItem('kiper_api_key', apiInput.value.trim());
    updateGenBtn();
  });
  document.getElementById('toggleKey').addEventListener('click', () => {
    apiInput.type = apiInput.type === 'password' ? 'text' : 'password';
  });

  /* ── ETAPAS (render) ── */
  const stageList = document.getElementById('stageList');
  const stageDesc = document.getElementById('stageDesc');
  Object.keys(STAGES).forEach(key => {
    const s = STAGES[key];
    const btn = document.createElement('button');
    btn.className = 'seg-btn';
    btn.innerHTML = `<div class="seg-name">${s.name}</div><div class="seg-tag">${s.tag}</div>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selStage = key;
      stageDesc.textContent = s.desc;
      stageDesc.classList.add('show');
      updateGenBtn();
    });
    stageList.appendChild(btn);
  });

  /* ── ÁNGULOS (render) ── */
  const list = document.getElementById('anglesList');
  ANGLES.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'angle-btn';
    btn.innerHTML = `<span class="angle-num">${a.n}</span><span class="angle-label">${a.t}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.angle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selAngle = a;
      updateGenBtn();
    });
    list.appendChild(btn);
  });

  /* ── STEPPER ── */
  document.getElementById('stepDown').addEventListener('click', () => {
    if (slideCount > 2) { slideCount--; document.getElementById('stepVal').textContent = slideCount; }
  });
  document.getElementById('stepUp').addEventListener('click', () => {
    if (slideCount < 6) { slideCount++; document.getElementById('stepVal').textContent = slideCount; }
  });

  /* ── GEN BUTTON STATE ── */
  function updateGenBtn() {
    const btn = document.getElementById('genBtn');
    const txt = document.getElementById('genText');
    const hooksBtn = document.getElementById('hooksBtn');
    const key = apiInput.value.trim();
    const ready = key && selStage && selAngle;
    hooksBtn.disabled = !ready;
    if (!key) { txt.textContent = 'Falta la API key'; btn.disabled = true; return; }
    if (!selStage) { txt.textContent = 'Elige una etapa'; btn.disabled = true; return; }
    if (!selAngle) { txt.textContent = 'Elige un ángulo'; btn.disabled = true; return; }
    txt.textContent = 'Generar carrusel';
    btn.disabled = false;
  }

  /* ── GENERATE ── */
  document.getElementById('genBtn').addEventListener('click', generate);
  document.getElementById('hooksBtn').addEventListener('click', generateHooks);

  async function generateHooks() {
    const key = apiInput.value.trim();
    if (!key || !selStage || !selAngle) return;

    const btn = document.getElementById('hooksBtn');
    const out = document.getElementById('output');
    const stage = STAGES[selStage];

    btn.disabled = true;
    btn.textContent = 'Generando hooks...';
    out.innerHTML = `<div class="loading-state"><div class="spinner"></div><p class="loading-text">Escribiendo 5 hooks para testear...</p></div>`;

    const hooksPrompt = `Eres copywriter senior de performance para Meta Ads de Kiper, reloj inteligente para niños 6–12 años en Colombia. La marca le habla al papá con criterio, no con miedo: cálido, seguro, inteligente, nunca alarmista ni culposo.

TENSIÓN CENTRAL DEL PAPÁ: "quiero saber de mi hijo, pero no quiero darle un celular".
ÁNGULO: Ángulo ${selAngle.n} — "${selAngle.t}".
${stage.prompt}

Genera 5 HOOKS distintos para este ángulo y etapa, pensados para TESTEAR cuál frena el scroll.

REGLAS DEL HOOK:
- Máx 8 palabras. Una sola idea. Su único trabajo es detener el scroll.
- Cada hook debe ser de UNO de estos tres tipos, y debes incluir variedad entre los tres:
  · "tension": nombra la tensión exacta del papá.
  · "curiosidad": abre un loop (pregunta, dato o frase incompleta) que obligue a deslizar.
  · "reframe": idea contraintuitiva o que rompe un falso dilema.
- Escritura en oración, habla de tú. Sin frases motivacionales vagas ni slogans que sirvan para cualquier marca. Sin "peligro/riesgo/adicción/amenaza".

Responde ÚNICAMENTE con este JSON (sin texto adicional, sin markdown):
{ "hooks": [ { "texto": "el hook", "tipo": "tension|curiosidad|reframe" } ] }`;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 800,
          messages: [{ role: 'user', content: hooksPrompt }]
        })
      });

      if (!resp.ok) {
        const errBody = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${errBody.slice(0, 400)}`);
      }

      const data = await resp.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

      const raw = (data.content || []).filter(c => c.type === 'text').map(c => c.text).join('');
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('No se encontró JSON en la respuesta.\n\nRespuesta: ' + raw.slice(0, 300));

      const parsed = JSON.parse(match[0]);
      if (!parsed.hooks || !Array.isArray(parsed.hooks)) throw new Error('Estructura inesperada en el JSON.');

      renderHooks(parsed.hooks);

    } catch (err) {
      out.innerHTML = `<div class="error-card">
        <div class="error-title">Error al generar hooks</div>
        <div class="error-body">${err.message}</div>
      </div>`;
    }

    btn.disabled = false;
    btn.textContent = '⚡ Generar 5 hooks para testear';
  }

  function renderHooks(hooks) {
    const out = document.getElementById('output');
    const stage = STAGES[selStage];
    const typeLabel = { tension: 'Tensión', curiosidad: 'Curiosidad', reframe: 'Reframe' };
    let html = `
      <div class="carousel-header">
        <div class="carousel-meta">
          <div class="carousel-chips">
            <span class="chip chip-stage">${stage.name} · ${stage.tag}</span>
            <span class="chip chip-count">${hooks.length} hooks</span>
          </div>
          <span class="carousel-angle">Hooks para testear · Ángulo ${selAngle.n}: ${selAngle.t}</span>
        </div>
      </div>`;

    hooks.forEach((h, i) => {
      const t = (h.tipo || 'curiosidad').toLowerCase();
      const cls = ['tension','curiosidad','reframe'].includes(t) ? t : 'curiosidad';
      html += `
        <div class="hook-card" style="animation-delay:${i * 0.06}s">
          <div class="hook-index">${i+1}</div>
          <div class="hook-main">
            <div class="hook-text">${h.texto || ''}</div>
            <span class="hook-type type-${cls}">${typeLabel[cls]}</span>
          </div>
          <button class="btn-copy" onclick="copyText('${(h.texto||'').replace(/'/g,"\\'")}', this)">Copiar</button>
        </div>`;
    });
    out.innerHTML = html;
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).catch(() => {});
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1800);
  }

  async function generate() {
    const key = apiInput.value.trim();
    if (!key || !selStage || !selAngle) return;

    const btn = document.getElementById('genBtn');
    const txt = document.getElementById('genText');
    const out = document.getElementById('output');
    const stage = STAGES[selStage];

    btn.disabled = true;
    txt.textContent = 'Generando...';
    out.innerHTML = `<div class="loading-state"><div class="spinner"></div><p class="loading-text">Escribiendo el carrusel con IA...</p></div>`;

    const prompt = `Eres copywriter senior de performance especializado en Meta Ads para marcas de familia y crianza consciente en Colombia.

VOZ DE MARCA — KIPER:
Kiper no le habla al papá con miedo. Le habla al papá con criterio.
Al que sabe lo que está construyendo. Al que quiere estar presente sin perderse una sola etapa.
Al que entiende que hay una diferencia enorme entre un hijo monitoreado y un hijo que te busca a ti primero cuando algo pasa.
Al que se niega a creer que la única forma de estar conectado con su hijo es darle un smartphone.
Tono: cálido, seguro, inteligente. Nunca alarmista. Nunca culposo. Nunca corporativo.

PRODUCTO: Kiper — reloj inteligente para niños 6–12 años. La alternativa al smartphone para el papá que quiere conexión real, no vigilancia.
FUNCIONES CLAVE: llamadas solo a contactos aprobados, mensajes de voz, GPS en tiempo real, foto remota desde el reloj, juegos educativos, control parental por WhatsApp. Sin redes sociales, sin apps, sin navegador.
OFERTA (úsala solo cuando la etapa lo permita): antes $449.900, hoy $399.900 COP. Plan mensual $32.900 (ilimitado, sin permanencia, primer mes gratis incluido). Envío gratis y pago contraentrega en Colombia. Producto de decisión, no de impulso.

ÁNGULO: Ángulo ${selAngle.n} — "${selAngle.t}"

${stage.prompt}

Genera exactamente ${slideCount + 2} slides: 1 hook + ${slideCount} contenido + 1 CTA.

REGLAS DE COPY — MUY IMPORTANTES:
- HOOK (lo más importante del carrusel): máx 8 palabras, una sola idea. Su único trabajo es DETENER EL SCROLL. Debe hacer UNA de estas tres cosas:
  1) Nombrar la tensión exacta del papá (ej. "saber de tu hijo sin darle celular").
  2) Abrir un loop de curiosidad que obligue a deslizar: una pregunta, un dato o una afirmación incompleta. No resuelvas la idea en el hook.
  3) Romper el patrón con algo contraintuitivo o un reframe (ej. "el mejor primer celular de tu hijo no es un celular").
- PROHIBIDO en el hook: frases motivacionales, slogans aspiracionales vagos o afirmaciones que podrían servir para cualquier marca.
  Ejemplo de hook DÉBIL: "Éxito profesional, éxito como papá" — afirma una meta, no genera tensión ni curiosidad, no para el scroll.
  Ejemplo FUERTE del mismo ángulo: "Eres el mejor en tu trabajo. ¿Y a las 3 p.m.?" — abre un loop con un momento concreto.
- Título de cada slide: máx 5 palabras. Concreto y humano.
- Mensaje de cada slide: máx 2 frases cortas, máx 18 palabras en total. Una idea por slide.
- CTA: máx 10 palabras. Botón: máx 3 palabras.
- Escritura en oración (primera letra mayúscula, resto minúscula). NUNCA TODO EN MAYÚSCULAS. Habla de tú.
- Sin párrafos, sin listas, sin signos de exclamación de más, sin inglés innecesario.
- Nada de palabras como "peligro", "riesgo", "adicción", "amenaza". Tono positivo y aspiracional.

REGLAS DE IMAGEN — cada slide tiene un SUJETO (foreground) sobre un FONDO en el sistema Kiper:
- Empieza SIEMPRE la descripción nombrando el sujeto y VARÍALO entre slides. No repitas el mismo sujeto en slides seguidas. Rota entre:
  "Familia ..." · "Niña ..." · "Niño ..." · "Papá con su hijo ..." · "Mamá con su hija ..." · "Solo el reloj Kiper ..." · "Manos del niño con el reloj ..." · "Niño jugando ..." · "Papá mirando el celular tranquilo ...".
  El sujeto es cálido y real (foto luminosa de gente colombiana real o product shot limpio del reloj), nunca render 3D ni estética de IA.
- FONDO y tratamiento siempre en el sistema visual de Kiper: base arena #F0EDE6, pasteles planos de la paleta (blush #F2C4CE, lavender #C9B8E8, mint #A8D8C8, peach #F5C49A, sky #A3CDED), máximo 4 colores. Acentos ilustrativos simples (sol, arcoíris, corazón, nube), máximo 3 por slide.
- Texto en Plus Jakarta Sans, alineado a la izquierda, mucho espacio en blanco, sombras suaves.
- PROHIBIDO: gradientes complejos, colores neón fuera de la paleta, estética de IA genérica, sujetos repetidos slide tras slide.

Responde ÚNICAMENTE con este JSON (sin texto adicional, sin markdown):
{
  "angulo": "${selAngle.t}",
  "etapa": "${stage.name}",
  "slides": [
    { "tipo": "hook", "mensaje": "texto del hook", "imagen": "descripción de la slide diseñada" },
    { "tipo": "contenido", "titulo": "título corto", "mensaje": "máx 2 frases cortas", "imagen": "descripción de la slide diseñada" },
    { "tipo": "cta", "mensaje": "cierre breve con llamado a la acción", "boton": "texto del botón", "imagen": "descripción de la slide diseñada" }
  ]
}`;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!resp.ok) {
        const errBody = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${errBody.slice(0, 400)}`);
      }

      const data = await resp.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

      const raw = (data.content || []).filter(c => c.type === 'text').map(c => c.text).join('');
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('No se encontró JSON en la respuesta.\n\nRespuesta: ' + raw.slice(0, 300));

      const parsed = JSON.parse(match[0]);
      if (!parsed.slides || !Array.isArray(parsed.slides)) throw new Error('Estructura inesperada en el JSON.');

      currentSlides = parsed.slides;
      renderCarousel(parsed.slides);

    } catch (err) {
      out.innerHTML = `<div class="error-card">
        <div class="error-title">Error al generar</div>
        <div class="error-body">${err.message}</div>
      </div>`;
    }

    btn.disabled = false;
    txt.textContent = 'Generar otro';
  }

  /* ── RENDER ── */
  function renderCarousel(slides) {
    const out = document.getElementById('output');
    const stage = STAGES[selStage];
    let html = `
      <div class="carousel-header">
        <div class="carousel-meta">
          <div class="carousel-chips">
            <span class="chip chip-stage">${stage.name} · ${stage.tag}</span>
            <span class="chip chip-count">${slides.length} slides</span>
          </div>
          <span class="carousel-angle">Ángulo ${selAngle.n}: ${selAngle.t}</span>
        </div>
        <button class="btn-export" onclick="exportAll()">⬇ Exportar todo</button>
      </div>`;

    slides.forEach((s, i) => {
      const isHook = s.tipo === 'hook';
      const isCta  = s.tipo === 'cta';
      const pillClass = isHook ? 'pill-hook' : isCta ? 'pill-cta' : 'pill-content';
      const pillLabel = isHook ? `Slide 1 · Hook` : isCta ? `Slide ${i+1} · CTA` : `Slide ${i+1} · Contenido`;

      let body = '';
      if (isHook) {
        body = `
          <div class="field-block">
            <span class="field-name">Mensaje</span>
            <div class="field-val">${s.mensaje || ''}</div>
          </div>
          <div class="field-block">
            <span class="field-name">🖼 Slide sugerida</span>
            <div class="field-val img-desc">${s.imagen || ''}</div>
          </div>`;
      } else if (isCta) {
        body = `
          <div class="field-block">
            <span class="field-name">Mensaje</span>
            <div class="field-val">${s.mensaje || ''}</div>
            <div class="field-val cta-btn">${s.boton || ''}</div>
          </div>
          <div class="field-block">
            <span class="field-name">🖼 Slide sugerida</span>
            <div class="field-val img-desc">${s.imagen || ''}</div>
          </div>`;
      } else {
        body = `
          <div class="field-block">
            ${s.titulo ? `<span class="field-name">Título</span><div class="field-val" style="font-weight:700">${s.titulo}</div>` : ''}
            <span class="field-name">Mensaje</span>
            <div class="field-val">${s.mensaje || ''}</div>
          </div>
          <div class="field-block">
            <span class="field-name">🖼 Slide sugerida</span>
            <div class="field-val img-desc">${s.imagen || ''}</div>
          </div>`;
      }

      html += `
        <div class="slide-card" style="animation-delay:${i * 0.06}s">
          <div class="slide-top">
            <span class="slide-pill ${pillClass}"><span class="pill-dot"></span>${pillLabel}</span>
            <button class="btn-copy" id="copy-${i}" onclick="copySlide(${i})">Copiar</button>
          </div>
          <div class="slide-body">${body}</div>
        </div>`;
    });

    out.innerHTML = html;
  }

  /* ── COPY ── */
  function copySlide(i) {
    const s = currentSlides[i];
    let text = '';
    if (s.tipo === 'hook')
      text = `HOOK:\n${s.mensaje}\n\nSLIDE SUGERIDA: ${s.imagen}`;
    else if (s.tipo === 'cta')
      text = `CTA:\n${s.mensaje}\nBotón: ${s.boton}\n\nSLIDE SUGERIDA: ${s.imagen}`;
    else
      text = `${s.titulo ? 'TÍTULO: ' + s.titulo + '\n' : ''}MENSAJE:\n${s.mensaje}\n\nSLIDE SUGERIDA: ${s.imagen}`;

    navigator.clipboard.writeText(text).catch(() => {});
    const btn = document.getElementById(`copy-${i}`);
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
  }

  function exportAll() {
    const stage = STAGES[selStage];
    let text = `CARRUSEL KIPER\nEtapa: ${stage.name} (${stage.tag})  ·  Ángulo ${selAngle.n}: ${selAngle.t}\n${'─'.repeat(50)}\n\n`;
    currentSlides.forEach((s, i) => {
      text += `SLIDE ${i+1} (${s.tipo.toUpperCase()})\n`;
      if (s.tipo === 'hook')
        text += `Mensaje: ${s.mensaje}\nSlide: ${s.imagen}\n\n`;
      else if (s.tipo === 'cta')
        text += `Mensaje: ${s.mensaje}\nBotón: ${s.boton}\nSlide: ${s.imagen}\n\n`;
      else
        text += `${s.titulo ? 'Título: ' + s.titulo + '\n' : ''}Mensaje: ${s.mensaje}\nSlide: ${s.imagen}\n\n`;
    });
    navigator.clipboard.writeText(text).catch(() => {});
    const btn = document.querySelector('.btn-export');
    btn.textContent = '✓ Copiado';
    setTimeout(() => { btn.textContent = '⬇ Exportar todo'; }, 2500);
  }
</script>
</body>
</html>
